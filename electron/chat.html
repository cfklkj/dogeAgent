<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dogeAgent - 聊天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .status-bar {
      display: flex;
      gap: 15px;
      align-items: center;
      font-size: 12px;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .status-item:hover {
      background: rgba(255, 255, 255, 0.25);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1.5s infinite;
    }
    
    .status-dot.ready {
      background: #10b981;
    }
    
    .status-dot.busy {
      background: #f59e0b;
    }
    
    .status-dot.error {
      background: #ef4444;
    }
    
    .status-dot.disconnected {
      background: #6b7280;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .chat-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    
    .message {
      margin-bottom: 15px;
      max-width: 80%;
      animation: messageIn 0.3s ease-out;
    }
    
    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message.user {
      margin-left: auto;
      background: #48bb78;
      color: white;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
    }
    
    .message.ai {
      margin-right: auto;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
    }
    
    .message-time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    
    .message.ai .message-time {
      text-align: left;
    }
    
    .input-area {
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: flex;
      gap: 10px;
    }
    
    #userInput {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
    }
    
    #userInput:focus {
      background: white;
    }
    
    #sendBtn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: #48bb78;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    #sendBtn:hover {
      background: #38a169;
      transform: scale(1.05);
    }
    
    #sendBtn:active {
      transform: scale(0.95);
    }
    
    .typing {
      font-style: italic;
      opacity: 0.7;
    }
    
    .clear-btn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    
    .clear-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    /* 状态详情面板 */
    .status-panel {
      position: fixed;
      top: 70px;
      right: 20px;
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      font-size: 12px;
      max-width: 280px;
      display: none;
      z-index: 1000;
    }
    
    .status-panel.show {
      display: block;
    }
    
    .status-panel h3 {
      margin-bottom: 10px;
      color: #333;
      font-size: 14px;
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }
    
    .status-row:last-child {
      border-bottom: none;
    }
    
    .status-label {
      color: #666;
    }
    
    .status-value {
      color: #333;
      font-weight: 500;
    }
    
    .status-value.error {
      color: #ef4444;
    }
    
    .status-value.success {
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🐶 dogeAgent</h1>
    <div class="status-bar">
      <div class="status-item" id="connectionStatus" title="连接状态">
        <span class="status-dot" id="connectionDot"></span>
        <span id="connectionText">连接中...</span>
      </div>
      <div class="status-item" id="agentStatus" title="Agent 状态">
        <span class="status-dot" id="agentDot"></span>
        <span id="agentText">初始化中</span>
      </div>
      <button class="clear-btn" id="clearBtn" title="清空聊天记录">🗑️</button>
    </div>
  </div>
  
  <!-- 状态详情面板 -->
  <div class="status-panel" id="statusPanel">
    <h3>📊 Agent 状态详情</h3>
    <div class="status-row">
      <span class="status-label">状态:</span>
      <span class="status-value" id="detailStatus">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">提供商:</span>
      <span class="status-value" id="detailProvider">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">模型:</span>
      <span class="status-value" id="detailModel">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">消息数:</span>
      <span class="status-value" id="detailMessageCount">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">错误数:</span>
      <span class="status-value" id="detailErrorCount">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">最后更新:</span>
      <span class="status-value" id="detailUpdateTime">-</span>
    </div>
  </div>
  
  <div class="chat-container" id="chatContainer">
    <!-- 消息会动态添加到这里 -->
  </div>
  
  <div class="input-area">
    <input type="text" id="userInput" placeholder="输入消息..." />
    <button id="sendBtn">➤</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const connectionDot = document.getElementById('connectionDot');
    const connectionText = document.getElementById('connectionText');
    const agentDot = document.getElementById('agentDot');
    const agentText = document.getElementById('agentText');
    const clearBtn = document.getElementById('clearBtn');
    const statusPanel = document.getElementById('statusPanel');
    const agentStatusItem = document.getElementById('agentStatus');
    
    // 聊天历史存储键名
    const CHAT_HISTORY_KEY = 'doge_chat_history';
    
    // 聊天历史
    let chatHistory = [];
    
    // 状态轮询
    let statusPolling = null;
    let lastStatusTime = null;
    
    // 格式化时间
    function formatTime(date) {
      const hours = date.getHours().toString().padStart(2, '0');
      const minutes = date.getMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }
    
    // 格式化日期时间
    function formatDateTime(isoString) {
      if (!isoString) return '-';
      try {
        const date = new Date(isoString);
        return date.toLocaleString('zh-CN');
      } catch (e) {
        return isoString;
      }
    }
    
    // 更新 Agent 状态显示
    function updateAgentStatus(status, provider, model, messageCount, errorCount, lastUpdate) {
      console.log('更新 Agent 状态:', { status, provider, model, messageCount, errorCount, lastUpdate });
      
      // 更新状态点
      agentDot.className = `status-dot ${status || 'disconnected'}`;
      
      // 更新状态文本
      const statusText = {
        'initializing': '初始化中',
        'ready': '就绪',
        'busy': '忙碌中',
        'error': '错误',
        'disconnected': '断开'
      }[status] || status || '未知';
      
      agentText.textContent = statusText;
      
      // 更新详情面板
      document.getElementById('detailStatus').textContent = statusText;
      document.getElementById('detailProvider').textContent = provider || '-';
      document.getElementById('detailModel').textContent = model || '-';
      document.getElementById('detailMessageCount').textContent = messageCount || 0;
      document.getElementById('detailErrorCount').textContent = errorCount || 0;
      document.getElementById('detailUpdateTime').textContent = formatDateTime(lastUpdate);
    }
    
    // 获取 Agent 状态
    function fetchAgentStatus() {
      try {
        ipcRenderer.send('send-to-python', {
          type: 'get_status',
          payload: {}
        });
      } catch (e) {
        console.error('获取状态失败:', e);
      }
    }
    
    // 开始轮询状态
    function startStatusPolling() {
      console.log('开始轮询 Agent 状态');
      fetchAgentStatus();
      if (statusPolling) {
        clearInterval(statusPolling);
      }
      statusPolling = setInterval(fetchAgentStatus, 3000); // 每 3 秒更新一次
    }
    
    // 保存聊天历史到 localStorage
    function saveHistory() {
      try {
        localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistory));
      } catch (e) {
        console.error('保存聊天历史失败:', e);
      }
    }
    
    // 从 localStorage 加载聊天历史
    function loadHistory() {
      try {
        const saved = localStorage.getItem(CHAT_HISTORY_KEY);
        if (saved) {
          chatHistory = JSON.parse(saved);
          console.log(`加载了 ${chatHistory.length} 条聊天记录`);
          // 重新渲染历史消息
          chatHistory.forEach(msg => {
            addMessageToDOM(msg.text, msg.isUser, msg.time, false);
          });
        } else {
          // 没有历史记录，添加欢迎消息
          const welcomeMsg = {
            text: '汪！我已经准备好了，可以开始聊天啦！',
            isUser: false,
            time: new Date().toISOString()
          };
          chatHistory.push(welcomeMsg);
          addMessageToDOM(welcomeMsg.text, welcomeMsg.isUser, welcomeMsg.time);
          saveHistory();
        }
      } catch (e) {
        console.error('加载聊天历史失败:', e);
      }
    }
    
    // 添加消息到聊天
    function addMessage(text, isUser = false) {
      const time = new Date().toISOString();
      const msg = { text, isUser, time };
      chatHistory.push(msg);
      addMessageToDOM(text, isUser, time);
      saveHistory();
    }
    
    // 添加消息到 DOM
    function addMessageToDOM(text, isUser, timeISO, shouldSave = true) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
      
      const contentDiv = document.createElement('div');
      contentDiv.textContent = text;
      
      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      const date = new Date(timeISO);
      timeDiv.textContent = formatTime(date);
      
      messageDiv.appendChild(contentDiv);
      messageDiv.appendChild(timeDiv);
      chatContainer.appendChild(messageDiv);
      
      // 滚动到底部
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    
    // 清空聊天历史
    function clearHistory() {
      if (confirm('确定要清空所有聊天记录吗？')) {
        chatHistory = [];
        localStorage.removeItem(CHAT_HISTORY_KEY);
        chatContainer.innerHTML = '';
        // 添加新的欢迎消息
        const welcomeMsg = {
          text: '汪！聊天记录已清空，我们重新开始吧！',
          isUser: false,
          time: new Date().toISOString()
        };
        chatHistory.push(welcomeMsg);
        addMessageToDOM(welcomeMsg.text, welcomeMsg.isUser, welcomeMsg.time);
        saveHistory();
      }
    }
    
    // 发送消息
    function sendMessage() {
      const message = userInput.value.trim();
      if (message) {
        // 添加用户消息
        addMessage(message, true);
        
        // 发送到 Python
        ipcRenderer.send('send-to-python', {
          type: 'chat',
          payload: {
            message: message,
            history: chatHistory.slice(-10).map(m => ({
              role: m.isUser ? 'human' : 'ai',
              content: m.text
            }))
          }
        });
        
        userInput.value = '';
      }
    }
    
    // 监听 Python 响应
    ipcRenderer.on('python-message', (event, message) => {
      console.log('收到 Python 消息:', message);
      
      if (message.type === 'chat_response') {
        const data = message.data;
        if (data.status === 'success') {
          addMessage(data.response, false);
        } else {
          addMessage('汪...出错了：' + data.message, false);
        }
      } else if (message.type === 'status_response') {
        // 处理状态响应
        console.log('收到状态响应:', message.data);
        const data = message.data;
        if (data && data.status === 'success' && data.data) {
          const statusData = data.data;
          updateAgentStatus(
            statusData.status,
            statusData.provider,
            statusData.model,
            statusData.message_count,
            statusData.error_count,
            statusData.last_update
          );
        }
      }
    });
    
    // 连接状态
    ipcRenderer.on('connection-status', (event, status) => {
      console.log('连接状态变化:', status);
      if (status === 'connected') {
        connectionDot.className = 'status-dot ready';
        connectionText.textContent = '已连接';
        // 开始轮询 Agent 状态
        startStatusPolling();
      } else if (status === 'disconnected') {
        connectionDot.className = 'status-dot disconnected';
        connectionText.textContent = '未连接';
        // 停止轮询
        if (statusPolling) {
          clearInterval(statusPolling);
          statusPolling = null;
        }
      } else {
        connectionDot.className = 'status-dot';
        connectionText.textContent = '连接中...';
      }
    });
    
    // 发送按钮
    sendBtn.addEventListener('click', sendMessage);
    
    // 回车发送
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
    
    // 清空按钮
    clearBtn.addEventListener('click', clearHistory);
    
    // 点击 Agent 状态显示详情
    agentStatusItem.addEventListener('click', () => {
      statusPanel.classList.toggle('show');
      console.log('切换状态面板显示');
    });
    
    // 点击其他地方关闭状态面板
    document.addEventListener('click', (e) => {
      if (!statusPanel.contains(e.target) && !agentStatusItem.contains(e.target)) {
        statusPanel.classList.remove('show');
      }
    });
    
    // 窗口加载时加载历史记录
    loadHistory();
    
    console.log('dogeAgent 聊天窗口已启动！');
  </script>
</body>
</html>
