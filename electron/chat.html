<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dogeAgent - иҒҠеӨ©</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .status-bar {
      display: flex;
      gap: 15px;
      align-items: center;
      font-size: 12px;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .status-item:hover { background: rgba(255, 255, 255, 0.25); }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1.5s infinite;
    }
    .status-dot.ready { background: #10b981; }
    .status-dot.busy { background: #f59e0b; }
    .status-dot.error { background: #ef4444; }
    .status-dot.disconnected { background: #6b7280; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .chat-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      position: relative;
    }
    .message {
      margin-bottom: 15px;
      max-width: 80%;
      animation: messageIn 0.3s ease-out;
    }
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      margin-left: auto;
      background: #48bb78;
      color: white;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
    }
    .message.ai {
      margin-right: auto;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
    }
    .message-time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    .message.ai .message-time { text-align: left; }
    .typing-indicator {
      display: none;
      margin-bottom: 15px;
      margin-right: auto;
      max-width: 80%;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
      animation: messageIn 0.3s ease-out;
    }
    .typing-indicator.show { display: inline-block; }
    .typing-indicator .typing-content {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .typing-indicator .typing-dots { display: flex; gap: 4px; }
    .typing-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      animation: typingDot 1.4s infinite;
    }
    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    .typing-indicator .typing-text {
      font-style: italic;
      color: #666;
      font-size: 13px;
    }
    .input-area {
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #userInput {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
    }
    #userInput:focus { background: white; }
    #sendBtn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: #48bb78;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #sendBtn:hover { background: #38a169; transform: scale(1.05); }
    #sendBtn:active { transform: scale(0.95); }
    #voiceBtn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    #voiceBtn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }
    #voiceBtn.recording {
      background: #ef4444;
      animation: pulse 1s infinite;
    }
    #voiceBtn::after {
      content: attr(data-status);
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      white-space: nowrap;
      display: none;
    }
    #voiceBtn.recording::after {
      display: block;
      content: 'еҪ•йҹідё?..';
    }
    .clear-btn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: rgba(255, 255, 255, 0.3); }
    .status-panel {
      position: fixed;
      top: 70px;
      right: 20px;
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      font-size: 12px;
      max-width: 280px;
      display: none;
      z-index: 1000;
    }
    .status-panel.show { display: block; }
    .status-panel h3 { margin-bottom: 10px; color: #333; font-size: 14px; }
    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }
    .status-row:last-child { border-bottom: none; }
    .status-label { color: #666; }
    .status-value { color: #333; font-weight: 500; }
    .status-value.error { color: #ef4444; }
    .status-value.success { color: #10b981; }
  </style>
</head>
<body>
  <div class="header">
    <h1>рҹҗ¶ dogeAgent</h1>
    <div class="status-bar">
      <div class="status-item" id="connectionStatus" title="иҝһжҺҘзҠ¶жҖ?>
        <span class="status-dot" id="connectionDot"></span>
        <span id="connectionText">иҝһжҺҘдё?..</span>
      </div>
      <div class="status-item" id="agentStatus" title="Agent зҠ¶жҖ?>
        <span class="status-dot" id="agentDot"></span>
        <span id="agentText">еҲқе§ӢеҢ–дёӯ</span>
      </div>
      <button class="clear-btn" id="clearBtn" title="жё…з©әиҒҠеӨ©и®°еҪ•">рҹ—‘пё?/button>
    </div>
  </div>
  
  <div class="status-panel" id="statusPanel">
    <h3>рҹ“Ҡ Agent зҠ¶жҖҒиҜҰжғ?/h3>
    <div class="status-row">
      <span class="status-label">зҠ¶жҖ?</span>
      <span class="status-value" id="detailStatus">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">жҸҗдҫӣе•?</span>
      <span class="status-value" id="detailProvider">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">жЁЎеһӢ:</span>
      <span class="status-value" id="detailModel">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">ж¶ҲжҒҜж•?</span>
      <span class="status-value" id="detailMessageCount">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">й”ҷиҜҜж•?</span>
      <span class="status-value" id="detailErrorCount">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">жңҖеҗҺжӣҙж–?</span>
      <span class="status-value" id="detailUpdateTime">-</span>
    </div>
  </div>
  
  <div class="chat-container" id="chatContainer">
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-content">
        <div class="typing-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <span class="typing-text">Doge жӯЈеңЁжҖқиҖғдёӯ...</span>
      </div>
    </div>
  </div>
  
  <div class="input-area">
    <button id="voiceBtn" title="зӮ№еҮ»ејҖе§ӢеҪ•йҹіпјҢеҶҚж¬ЎзӮ№еҮ»еҒңжӯўе№¶еҸ‘йҖ?>рҹҺӨ</button>
    <input type="text" id="userInput" placeholder="иҫ“е…Ҙж¶ҲжҒҜ..." />
    <button id="sendBtn">вһ?/button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const connectionDot = document.getElementById('connectionDot');
    const connectionText = document.getElementById('connectionText');
    const agentDot = document.getElementById('agentDot');
    const agentText = document.getElementById('agentText');
    const clearBtn = document.getElementById('clearBtn');
    const statusPanel = document.getElementById('statusPanel');
    const agentStatusItem = document.getElementById('agentStatus');
    const typingIndicator = document.getElementById('typingIndicator');
    
    const CHAT_HISTORY_KEY = 'doge_chat_history';
    let chatHistory = [];
    let lastKnownStatus = 'initializing';
    
    // иҜӯйҹіеҪ•йҹізӣёе…і
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let speechRecognition = null;
    let finalTranscript = '';
    let recordingStartTime = 0;
    
    // еҲқе§ӢеҢ–иҜӯйҹіеҪ•еҲ?
    async function initVoiceRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            sampleRate: 16000
          } 
        });
        
        mediaRecorder = new MediaRecorder(stream);
        
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
            console.log(`[иҜӯйҹі] еҪ•йҹіж•°жҚ®еқ—пјҡ${event.data.size} еӯ—иҠӮ`);
          }
        };
        
        mediaRecorder.onstop = async () => {
          console.log('[иҜӯйҹі] еҪ•йҹіеҒңжӯў');
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          audioChunks = [];
          
          const duration = Date.now() - recordingStartTime;
          // НЈЦ№УпТфК¶ұр
          if (speechRecognition) { speechRecognition.stop(); }
          // К№УГК¶ұрҪб№ы
          if (finalTranscript && finalTranscript.trim()) {
            userInput.value = finalTranscript.trim();
            finalTranscript = '';
            setTimeout(() => sendMessage(), 800);
          } else {
          console.log(`[иҜӯйҹі] еҪ•йҹіж—¶й•ҝпј?{(duration / 1000).toFixed(2)}з§’`);
          
          // иҪ¬жҚўдёәж–Үжң¬пјҲдҪҝз”Ё Web Speech API зҡ„иҜӯйҹіиҜҶеҲ«пјү
          await processRecording(audioBlob);
        };
        
        console.log('[иҜӯйҹі] еҪ•йҹіеҲқе§ӢеҢ–жҲҗеҠ?);
        return true;
      } catch (error) {
        console.error('[иҜӯйҹі] еҲқе§ӢеҢ–еӨұиҙ?', error);
        alert('ж— жі•и®ҝй—®йәҰе…ӢйЈҺпјҢиҜ·жЈҖжҹҘжқғйҷҗи®ҫзҪ?);
        return false;
      }
    }
    
    // еӨ„зҗҶеҪ•йҹі - дҪҝз”ЁжөҸи§ҲеҷЁеҺҹз”ҹиҜӯйҹіиҜҶеҲ?
    async function processRecording(audioBlob) {
      // з®ҖеҚ•ж–№жЎҲпјҡзӣҙжҺҘдҪҝз”ЁжөҸи§ҲеҷЁиҜӯйҹіиҜҶеҲ?
      // еҰӮжһңйңҖиҰҒжӣҙеҮҶзЎ®зҡ„иҜҶеҲ«пјҢеҸҜд»ҘдёҠдј йҹійў‘ж–Үд»¶еҲ°жңҚеҠЎз«Ҝ
      console.log('[иҜӯйҹі] еҪ•йҹіе®ҢжҲҗпјҢеӨ§е°?', audioBlob.size);
      
      // з”ұдәҺжөҸи§ҲеҷЁйҷҗеҲ¶пјҢиҝҷйҮҢдҪҝз”Ёз®ҖеҚ•зҡ„ж–№жЎҲпј?
      // 1. жҳҫзӨәеҪ•йҹіж—¶й•ҝ
      // 2. жҸҗзӨәз”ЁжҲ·иҫ“е…Ҙж–Үеӯ—
      const duration = (Date.now() - recordingStartTime) / 1000;
      const placeholder = `[еҪ•йҹі ${duration.toFixed(1)}з§’] `;
      userInput.value = placeholder + userInput.value;
      userInput.focus();
      
      // з®ҖеҚ•ж–№жЎҲпјҡи®©з”ЁжҲ·иҮӘе·ұдҝ®ж”№ж–Үеӯ—еҗҺеҸ‘йҖ?
      console.log('[иҜӯйҹі] иҜ·дҪҝз”Ёиҫ“е…Ҙжі•иҫ“е…Ҙж–Үеӯ—пјҢжҲ–з»§з»ӯеҪ•йҹі');
    }
    
    // зӮ№еҮ»иҜӯйҹіжҢүй’®
    async function toggleVoiceRecording() {
      // іхКј»ҜУпТфК¶ұр
      initSpeechRecognition();
      console.log('[иҜӯйҹі] жҢүй’®зӮ№еҮ»пјҢеҪ“еүҚзҠ¶жҖ?', isRecording ? 'еҪ•йҹідё? : 'жңӘеҪ•йҹ?);
      
      if (!isRecording) {
        // ејҖе§ӢеҪ•йҹ?
        if (mediaRecorder && mediaRecorder.state === 'inactive') {
          audioChunks = [];
          try {
            mediaRecorder.start(1000);
            if (speechRecognition) { speechRecognition.start(); } // жҜҸз§’дҝқеӯҳдёҖж¬?
            isRecording = true;
            recordingStartTime = Date.now();
            voiceBtn.classList.add('recording');
            voiceBtn.title = 'зӮ№еҮ»еҒңжӯўеҪ•йҹіе№¶еҸ‘йҖ?;
            console.log('[иҜӯйҹі] ејҖе§ӢеҪ•йҹ?);
          } catch (error) {
            console.error('[иҜӯйҹі] ејҖе§ӢеӨұиҙ?', error);
          }
        } else if (mediaRecorder) {
          // е·Із»ҸеҲқе§ӢеҢ–иҝҮ
          audioChunks = [];
          try {
            mediaRecorder.start(1000);
            if (speechRecognition) { speechRecognition.start(); }
            isRecording = true;
            recordingStartTime = Date.now();
            voiceBtn.classList.add('recording');
            voiceBtn.title = 'зӮ№еҮ»еҒңжӯўеҪ•йҹіе№¶еҸ‘йҖ?;
            console.log('[иҜӯйҹі] ејҖе§ӢеҪ•йҹ?(йҮҚж–°ејҖе§?');
          } catch (error) {
            console.error('[иҜӯйҹі] ејҖе§ӢеӨұиҙ?', error);
          }
        } else {
          // йҰ–ж¬ЎеҲқе§ӢеҢ?
          const success = await initVoiceRecording();
          if (success) {
            audioChunks = [];
            mediaRecorder.start(1000);
            if (speechRecognition) { speechRecognition.start(); }
            isRecording = true;
            recordingStartTime = Date.now();
            voiceBtn.classList.add('recording');
            voiceBtn.title = 'зӮ№еҮ»еҒңжӯўеҪ•йҹіе№¶еҸ‘йҖ?;
            console.log('[иҜӯйҹі] еҲқе§ӢеҢ–е№¶ејҖе§ӢеҪ•йҹ?);
          }
        }
      } else {
        // еҒңжӯўеҪ•йҹі
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
          isRecording = false;
          voiceBtn.classList.remove('recording');
          voiceBtn.title = 'зӮ№еҮ»ејҖе§ӢеҪ•йҹіпјҢеҶҚж¬ЎзӮ№еҮ»еҒңжӯўе№¶еҸ‘йҖ?;
          console.log('[иҜӯйҹі] еҒңжӯўеҪ•йҹі');
        }
      }
    }
    
    function formatTime(date) {
      const hours = date.getHours().toString().padStart(2, '0');
      const minutes = date.getMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }
    
    function formatDateTime(isoString) {
      if (!isoString) return '-';
      try {
        const date = new Date(isoString);
        return date.toLocaleString('zh-CN');
      } catch (e) {
        return isoString;
      }
    }
    
    function showTypingIndicator(show) {
      if (show) {
        typingIndicator.classList.add('show');
        chatContainer.scrollTop = chatContainer.scrollHeight;
      } else {
        typingIndicator.classList.remove('show');
      }
    }
    
    function updateAgentStatus(status, provider, model, messageCount, errorCount, lastUpdate) {
      console.log('[зҠ¶жҖҒ] жӣҙж–°:', { status, provider, model, messageCount, errorCount, lastUpdate });
      agentDot.className = `status-dot ${status || 'disconnected'}`;
      const statusText = {
        'initializing': 'еҲқе§ӢеҢ–дёӯ',
        'ready': 'е°ұз»Ә',
        'busy': 'еҝҷзўҢдё?,
        'error': 'й”ҷиҜҜ',
        'disconnected': 'ж–ӯејҖ'
      }[status] || status || 'жңӘзҹҘ';
      agentText.textContent = statusText;
      document.getElementById('detailStatus').textContent = statusText;
      document.getElementById('detailProvider').textContent = provider || '-';
      document.getElementById('detailModel').textContent = model || '-';
      document.getElementById('detailMessageCount').textContent = messageCount || 0;
      document.getElementById('detailErrorCount').textContent = errorCount || 0;
      document.getElementById('detailUpdateTime').textContent = formatDateTime(lastUpdate);
      
      if (status === 'busy' && lastKnownStatus !== 'busy') {
        console.log('[зҠ¶жҖҒ] ејҖе§ӢеҝҷзўҢпјҢжҳҫзӨәиҫ“е…ҘжҸҗзӨә');
        showTypingIndicator(true);
      } else if (status !== 'busy' && lastKnownStatus === 'busy') {
        console.log('[зҠ¶жҖҒ] е®ҢжҲҗеҝҷзўҢпјҢйҡҗи—Ҹиҫ“е…ҘжҸҗзӨ?);
        showTypingIndicator(false);
      }
      lastKnownStatus = status || 'disconnected';
    }
    
    function saveHistory() {
      try {
        localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistory));
      } catch (e) {
        console.error('[еҺҶеҸІ] дҝқеӯҳеӨұиҙҘ:', e);
      }
    }
    
    function loadHistory() {
      try {
        const saved = localStorage.getItem(CHAT_HISTORY_KEY);
        if (saved) {
          chatHistory = JSON.parse(saved);
          console.log(`[еҺҶеҸІ] еҠ иҪҪдә?${chatHistory.length} жқЎи®°еҪ•`);
          chatHistory.forEach(msg => {
            addMessageToDOM(msg.text, msg.isUser, msg.time, false);
          });
        } else {
          const welcomeMsg = {
            text: 'жұӘпјҒжҲ‘е·Із»ҸеҮҶеӨҮеҘҪдәҶпјҢеҸҜд»ҘејҖе§ӢиҒҠеӨ©е•Ұпј?,
            isUser: false,
            time: new Date().toISOString()
          };
          chatHistory.push(welcomeMsg);
          addMessageToDOM(welcomeMsg.text, welcomeMsg.isUser, welcomeMsg.time);
          saveHistory();
        }
      } catch (e) {
        console.error('[еҺҶеҸІ] еҠ иҪҪеӨұиҙҘ:', e);
      }
    }
    
    function addMessage(text, isUser = false) {
      const time = new Date().toISOString();
      const msg = { text, isUser, time };
      chatHistory.push(msg);
      addMessageToDOM(text, isUser, time);
      saveHistory();
    }
    
    function addMessageToDOM(text, isUser, timeISO) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
      const contentDiv = document.createElement('div');
      contentDiv.textContent = text;
      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      const date = new Date(timeISO);
      timeDiv.textContent = formatTime(date);
      messageDiv.appendChild(contentDiv);
      messageDiv.appendChild(timeDiv);
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    
    function clearHistory() {
      if (confirm('зЎ®е®ҡиҰҒжё…з©әжүҖжңүиҒҠеӨ©и®°еҪ•еҗ—пј?)) {
        chatHistory = [];
        localStorage.removeItem(CHAT_HISTORY_KEY);
        chatContainer.innerHTML = '';
        const welcomeMsg = {
          text: 'жұӘпјҒиҒҠеӨ©и®°еҪ•е·Іжё…з©әпјҢжҲ‘д»¬йҮҚж–°ејҖе§Ӣеҗ§пј?,
          isUser: false,
          time: new Date().toISOString()
        };
        chatHistory.push(welcomeMsg);
        addMessageToDOM(welcomeMsg.text, welcomeMsg.isUser, welcomeMsg.time);
        saveHistory();
      }
    }
    
    function sendMessage() {
      const message = userInput.value.trim();
      if (message) {
        addMessage(message, true);
        ipcRenderer.send('send-to-python', {
          type: 'chat',
          payload: {
            message: message,
            history: chatHistory.slice(-10).map(m => ({
              role: m.isUser ? 'human' : 'ai',
              content: m.text
            }))
          }
        });
        userInput.value = '';
      }
    }
    
    function playAIResponse(text) {
      console.log('[TTS] иҜ·жұӮж’ӯж”ҫ:', text.substring(0, 50) + '...');
      // з®ҖеҚ•ж–№жЎҲпјҡдҪҝз”ЁжөҸи§ҲеҷЁеҺҹз”?TTS
      browserTTS(text);
    }
    
    function browserTTS(text) {
      console.log('[TTS] дҪҝз”ЁжөҸи§ҲеҷЁеҺҹз”?TTS:', text.substring(0, 50) + '...');
      try {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;
        utterance.onstart = () => { console.log('[TTS] жөҸи§Ҳеҷ?TTS ејҖе§?); };
        utterance.onend = () => { console.log('[TTS] жөҸи§Ҳеҷ?TTS з»“жқҹ'); };
        utterance.onerror = (event) => { console.error('[TTS] жөҸи§Ҳеҷ?TTS й”ҷиҜҜ:', event); };
        speechSynthesis.speak(utterance);
        return true;
      } catch (e) {
        console.error('[TTS] жөҸи§Ҳеҷ?TTS еӨұиҙҘ:', e);
        return false;
      }
    }
    
    ipcRenderer.on('python-message', (event, message) => {
      console.log('[жҺҘж”¶]', message.type, message);
      
      if (message.type === 'chat_response') {
        const data = message.data;
        if (data.status === 'success') {
          addMessage(data.response, false);
          playAIResponse(data.response);
        } else {
          addMessage('жұ?..еҮәй”ҷдәҶпјҡ' + data.message, false);
        }
      } else if (message.type === 'status_response' || message.type === 'status_update') {
        const data = message.data;
        if (data && data.status === 'success' && data.data) {
          const statusData = data.data;
          updateAgentStatus(
            statusData.status,
            statusData.provider,
            statusData.model,
            statusData.message_count,
            statusData.error_count,
            statusData.last_update
          );
        }
      }
    });
    
    ipcRenderer.on('connection-status', (event, status) => {
      console.log('[иҝһжҺҘ]', status);
      if (status === 'connected') {
        connectionDot.className = 'status-dot ready';
        connectionText.textContent = 'е·ІиҝһжҺ?;
      } else if (status === 'disconnected') {
        connectionDot.className = 'status-dot disconnected';
        connectionText.textContent = 'жңӘиҝһжҺ?;
      } else {
        connectionDot.className = 'status-dot';
        connectionText.textContent = 'иҝһжҺҘдё?..';
      }
    });
    
    sendBtn.addEventListener('click', sendMessage);
    
    // иҜӯйҹіжҢүй’®зӮ№еҮ»дәӢд»¶
    voiceBtn.addEventListener('click', () => {
      console.log('[иҜӯйҹі] жҢүй’®зӮ№еҮ»');
      toggleVoiceRecording();
    });
    
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') { sendMessage(); }
    });
    
    clearBtn.addEventListener('click', clearHistory);
    
    agentStatusItem.addEventListener('click', () => {
      statusPanel.classList.toggle('show');
      console.log('[з•Ңйқў] еҲҮжҚўзҠ¶жҖҒйқўжқ?);
    });
    
    document.addEventListener('click', (e) => {
      if (!statusPanel.contains(e.target) && !agentStatusItem.contains(e.target)) {
        statusPanel.classList.remove('show');
      }
    });
    
    // еҲқе§ӢеҢ?
    loadHistory();
    console.log('dogeAgent иҒҠеӨ©зӘ—еҸЈе·ІеҗҜеҠЁпјҒ');
    console.log('[иҜӯйҹі] зӮ№еҮ»йәҰе…ӢйЈҺжҢүй’®ејҖе§ӢеҪ•йҹ?);
  </script>
</body>
</html>
