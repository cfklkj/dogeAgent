<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dogeAgent - 聊天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .status {
      font-size: 12px;
      opacity: 0.8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1.5s infinite;
    }
    
    .status-dot.connected {
      background: #10b981;
    }
    
    .status-dot.disconnected {
      background: #ef4444;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .chat-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    
    .message {
      margin-bottom: 15px;
      max-width: 80%;
      animation: messageIn 0.3s ease-out;
    }
    
    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message.user {
      margin-left: auto;
      background: #48bb78;
      color: white;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
    }
    
    .message.ai {
      margin-right: auto;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
    }
    
    .input-area {
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: flex;
      gap: 10px;
    }
    
    #userInput {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
    }
    
    #userInput:focus {
      background: white;
    }
    
    #sendBtn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: #48bb78;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    #sendBtn:hover {
      background: #38a169;
      transform: scale(1.05);
    }
    
    #sendBtn:active {
      transform: scale(0.95);
    }
    
    .typing {
      font-style: italic;
      opacity: 0.7;
      font-size: 12px;
      margin-top: 5px;
    }
    
    .system-message {
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🐶 dogeAgent</h1>
    <div class="status" id="statusEl">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">连接中...</span>
    </div>
  </div>
  
  <div class="chat-container" id="chatContainer">
    <div class="system-message" id="systemMessage">正在连接到 DogeAgent...</div>
  </div>
  
  <div class="input-area">
    <input type="text" id="userInput" placeholder="和小狗说说话..." onkeypress="handleKeyPress(event)" disabled>
    <button id="sendBtn" onclick="sendMessage()" disabled>➤</button>
  </div>
  
  <script>
    const { ipcRenderer } = require('electron');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const systemMessage = document.getElementById('systemMessage');
    
    let isConnected = false;
    let pythonReady = false;
    
    // 更新连接状态
    function updateConnectionStatus(connected, message) {
      isConnected = connected;
      pythonReady = connected;
      
      if (connected) {
        statusDot.className = 'status-dot connected';
        statusText.textContent = message || '已连接';
        userInput.disabled = false;
        sendBtn.disabled = false;
        systemMessage.style.display = 'none';
      } else {
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = message || '未连接';
        userInput.disabled = true;
        sendBtn.disabled = true;
      }
    }
    
    // 发送消息
    function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !pythonReady) return;
      
      // 添加用户消息
      addMessage(text, 'user');
      userInput.value = '';
      
      // 发送到 Python
      ipcRenderer.send('send-to-python', {
        type: 'chat',
        payload: { message: text }
      });
      
      // 显示思考中
      showTyping();
    }
    
    // 添加消息到聊天框
    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    
    // 显示思考中
    function showTyping() {
      removeTyping();
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.textContent = 'Doge 正在思考...';
      chatContainer.appendChild(typing);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    
    // 移除思考提示
    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }
    
    // 处理按键
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }
    
    // 监听 Python 响应（从主进程转发）
    ipcRenderer.on('python-message', (event, message) => {
      console.log('Chat received python-message:', message);
      
      if (message.type === 'ready') {
        updateConnectionStatus(true, '已连接');
        addMessage('汪！我已经准备好了，可以开始聊天啦！', 'ai');
      }
      
      if (message.type === 'chat_response') {
        removeTyping();
        const data = message.data;
        
        if (data.status === 'success') {
          addMessage(data.message, 'ai');
        } else {
          addMessage('出错了：' + (data.message || '未知错误'), 'ai');
        }
      }
      
      if (message.type === 'error') {
        updateConnectionStatus(false, '连接错误');
        addMessage('系统错误：' + (message.data?.message || '未知错误'), 'ai');
      }
    });
    
    // 监听连接状态
    ipcRenderer.on('connection-status', (event, status) => {
      console.log('Connection status:', status);
      if (status === 'connected') {
        updateConnectionStatus(true, '已连接');
      } else if (status === 'disconnected') {
        updateConnectionStatus(false, '未连接');
      } else if (status === 'connecting') {
        updateConnectionStatus(false, '连接中...');
      }
    });
    
    // 初始化 - 请求连接状态
    setTimeout(() => {
      if (!isConnected) {
        updateConnectionStatus(false, '未连接');
        systemMessage.textContent = '⚠️ 无法连接到 DogeAgent 后端，请检查 Python 服务是否运行';
        systemMessage.style.display = 'block';
      }
    }, 5000);
    
    console.log('Chat window initialized');
  </script>
</body>
</html>
