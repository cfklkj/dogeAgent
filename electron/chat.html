<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dogeAgent - 聊天</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .status-bar {
      display: flex;
      gap: 15px;
      align-items: center;
      font-size: 12px;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .status-item:hover { background: rgba(255, 255, 255, 0.25); }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1.5s infinite;
    }
    .status-dot.ready { background: #10b981; }
    .status-dot.busy { background: #f59e0b; }
    .status-dot.error { background: #ef4444; }
    .status-dot.disconnected { background: #6b7280; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .chat-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      position: relative;
    }
    .message {
      margin-bottom: 15px;
      max-width: 80%;
      animation: messageIn 0.3s ease-out;
    }
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      margin-left: auto;
      background: #48bb78;
      color: white;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
    }
    .message.ai {
      margin-right: auto;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
    }
    .message-time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    .message.ai .message-time { text-align: left; }
    .typing-indicator {
      display: none;
      margin-bottom: 15px;
      margin-right: auto;
      max-width: 80%;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
      animation: messageIn 0.3s ease-out;
    }
    .typing-indicator.show { display: inline-block; }
    .typing-indicator .typing-content {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .typing-indicator .typing-dots { display: flex; gap: 4px; }
    .typing-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      animation: typingDot 1.4s infinite;
    }
    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    .typing-indicator .typing-text {
      font-style: italic;
      color: #666;
      font-size: 13px;
    }
    .input-area {
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #userInput {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
    }
    #userInput:focus { background: white; }
    #sendBtn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: #48bb78;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #sendBtn:hover { background: #38a169; transform: scale(1.05); }
    #sendBtn:active { transform: scale(0.95); }
    #voiceBtn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #voiceBtn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }
    #voiceBtn.listening { background: #ef4444; animation: pulse 1s infinite; }
    .clear-btn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: rgba(255, 255, 255, 0.3); }
    .status-panel {
      position: fixed;
      top: 70px;
      right: 20px;
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      font-size: 12px;
      max-width: 280px;
      display: none;
      z-index: 1000;
    }
    .status-panel.show { display: block; }
    .status-panel h3 { margin-bottom: 10px; color: #333; font-size: 14px; }
    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }
    .status-row:last-child { border-bottom: none; }
    .status-label { color: #666; }
    .status-value { color: #333; font-weight: 500; }
    .status-value.error { color: #ef4444; }
    .status-value.success { color: #10b981; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🐶 dogeAgent</h1>
    <div class="status-bar">
      <div class="status-item" id="connectionStatus" title="连接状态">
        <span class="status-dot" id="connectionDot"></span>
        <span id="connectionText">连接中...</span>
      </div>
      <div class="status-item" id="agentStatus" title="Agent 状态">
        <span class="status-dot" id="agentDot"></span>
        <span id="agentText">初始化中</span>
      </div>
      <button class="clear-btn" id="clearBtn" title="清空聊天记录">🗑️</button>
    </div>
  </div>
  
  <div class="status-panel" id="statusPanel">
    <h3>📊 Agent 状态详情</h3>
    <div class="status-row">
      <span class="status-label">状态:</span>
      <span class="status-value" id="detailStatus">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">提供商:</span>
      <span class="status-value" id="detailProvider">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">模型:</span>
      <span class="status-value" id="detailModel">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">消息数:</span>
      <span class="status-value" id="detailMessageCount">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">错误数:</span>
      <span class="status-value" id="detailErrorCount">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">最后更新:</span>
      <span class="status-value" id="detailUpdateTime">-</span>
    </div>
  </div>
  
  <div class="chat-container" id="chatContainer">
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-content">
        <div class="typing-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <span class="typing-text">Doge 正在思考中...</span>
      </div>
    </div>
  </div>
  
  <div class="input-area">
    <button id="voiceBtn" title="语音输入">🎤</button>
    <input type="text" id="userInput" placeholder="输入消息..." />
    <button id="sendBtn">➤</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const connectionDot = document.getElementById('connectionDot');
    const connectionText = document.getElementById('connectionText');
    const agentDot = document.getElementById('agentDot');
    const agentText = document.getElementById('agentText');
    const clearBtn = document.getElementById('clearBtn');
    const statusPanel = document.getElementById('statusPanel');
    const agentStatusItem = document.getElementById('agentStatus');
    const typingIndicator = document.getElementById('typingIndicator');
    
    const CHAT_HISTORY_KEY = 'doge_chat_history';
    let chatHistory = [];
    let lastKnownStatus = 'initializing';
    let recognition = null;
    let isListening = false;
    
    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onstart = () => {
          isListening = true;
          voiceBtn.classList.add('listening');
          voiceBtn.title = '正在监听...';
          console.log('[语音] 识别开始');
        };
        
        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          console.log('[语音] 识别结果:', transcript);
          userInput.value = transcript;
          setTimeout(() => sendMessage(), 500);
        };
        
        recognition.onerror = (event) => {
          console.error('[语音] 错误:', event.error);
          isListening = false;
          voiceBtn.classList.remove('listening');
          voiceBtn.title = '语音输入';
        };
        
        recognition.onend = () => {
          isListening = false;
          voiceBtn.classList.remove('listening');
          voiceBtn.title = '语音输入';
          console.log('[语音] 识别结束');
        };
        
        console.log('[语音] 语音识别已初始化');
      } else {
        console.warn('[语音] 浏览器不支持语音识别');
        voiceBtn.style.display = 'none';
      }
    }
    
    function formatTime(date) {
      const hours = date.getHours().toString().padStart(2, '0');
      const minutes = date.getMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }
    
    function formatDateTime(isoString) {
      if (!isoString) return '-';
      try {
        const date = new Date(isoString);
        return date.toLocaleString('zh-CN');
      } catch (e) {
        return isoString;
      }
    }
    
    function showTypingIndicator(show) {
      if (show) {
        typingIndicator.classList.add('show');
        chatContainer.scrollTop = chatContainer.scrollHeight;
      } else {
        typingIndicator.classList.remove('show');
      }
    }
    
    function updateAgentStatus(status, provider, model, messageCount, errorCount, lastUpdate) {
      console.log('[状态] 更新:', { status, provider, model, messageCount, errorCount, lastUpdate });
      agentDot.className = `status-dot ${status || 'disconnected'}`;
      const statusText = {
        'initializing': '初始化中',
        'ready': '就绪',
        'busy': '忙碌中',
        'error': '错误',
        'disconnected': '断开'
      }[status] || status || '未知';
      agentText.textContent = statusText;
      document.getElementById('detailStatus').textContent = statusText;
      document.getElementById('detailProvider').textContent = provider || '-';
      document.getElementById('detailModel').textContent = model || '-';
      document.getElementById('detailMessageCount').textContent = messageCount || 0;
      document.getElementById('detailErrorCount').textContent = errorCount || 0;
      document.getElementById('detailUpdateTime').textContent = formatDateTime(lastUpdate);
      
      if (status === 'busy' && lastKnownStatus !== 'busy') {
        console.log('[状态] 开始忙碌，显示输入提示');
        showTypingIndicator(true);
      } else if (status !== 'busy' && lastKnownStatus === 'busy') {
        console.log('[状态] 完成忙碌，隐藏输入提示');
        showTypingIndicator(false);
      }
      lastKnownStatus = status || 'disconnected';
    }
    
    function saveHistory() {
      try {
        localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistory));
      } catch (e) {
        console.error('[历史] 保存失败:', e);
      }
    }
    
    function loadHistory() {
      try {
        const saved = localStorage.getItem(CHAT_HISTORY_KEY);
        if (saved) {
          chatHistory = JSON.parse(saved);
          console.log(`[历史] 加载了 ${chatHistory.length} 条记录`);
          chatHistory.forEach(msg => {
            addMessageToDOM(msg.text, msg.isUser, msg.time, false);
          });
        } else {
          const welcomeMsg = {
            text: '汪！我已经准备好了，可以开始聊天啦！',
            isUser: false,
            time: new Date().toISOString()
          };
          chatHistory.push(welcomeMsg);
          addMessageToDOM(welcomeMsg.text, welcomeMsg.isUser, welcomeMsg.time);
          saveHistory();
        }
      } catch (e) {
        console.error('[历史] 加载失败:', e);
      }
    }
    
    function addMessage(text, isUser = false) {
      const time = new Date().toISOString();
      const msg = { text, isUser, time };
      chatHistory.push(msg);
      addMessageToDOM(text, isUser, time);
      saveHistory();
    }
    
    function addMessageToDOM(text, isUser, timeISO) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
      const contentDiv = document.createElement('div');
      contentDiv.textContent = text;
      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      const date = new Date(timeISO);
      timeDiv.textContent = formatTime(date);
      messageDiv.appendChild(contentDiv);
      messageDiv.appendChild(timeDiv);
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    
    function clearHistory() {
      if (confirm('确定要清空所有聊天记录吗？')) {
        chatHistory = [];
        localStorage.removeItem(CHAT_HISTORY_KEY);
        chatContainer.innerHTML = '';
        const welcomeMsg = {
          text: '汪！聊天记录已清空，我们重新开始吧！',
          isUser: false,
          time: new Date().toISOString()
        };
        chatHistory.push(welcomeMsg);
        addMessageToDOM(welcomeMsg.text, welcomeMsg.isUser, welcomeMsg.time);
        saveHistory();
      }
    }
    
    function sendMessage() {
      const message = userInput.value.trim();
      if (message) {
        addMessage(message, true);
        ipcRenderer.send('send-to-python', {
          type: 'chat',
          payload: {
            message: message,
            history: chatHistory.slice(-10).map(m => ({
              role: m.isUser ? 'human' : 'ai',
              content: m.text
            }))
          }
        });
        userInput.value = '';
      }
    }
    
    function playAIResponse(text) {
      console.log('[TTS] 请求播放:', text.substring(0, 50) + '...');
      ipcRenderer.send('send-to-python', {
        type: 'tts',
        payload: {
          text: text,
          voice: 'zh-CN-YunxiNeural'
        }
      });
    }
    
    function playBase64Audio(base64Data, mimeType = 'audio/mpeg') {
      try {
        console.log('[TTS] 播放 Base64 音频，大小:', base64Data.length);
        const audio = new Audio(`data:${mimeType};base64,${base64Data}`);
        audio.play().then(() => {
          console.log('[TTS] 播放开始');
        }).catch(err => {
          console.error('[TTS] 播放失败:', err);
        });
      } catch (e) {
        console.error('[TTS] 播放错误:', e);
      }
    }
    
    function browserTTS(text) {
      console.log('[TTS] 使用浏览器原生 TTS:', text.substring(0, 50) + '...');
      try {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;
        utterance.onstart = () => { console.log('[TTS] 浏览器 TTS 开始'); };
        utterance.onend = () => { console.log('[TTS] 浏览器 TTS 结束'); };
        utterance.onerror = (event) => { console.error('[TTS] 浏览器 TTS 错误:', event); };
        speechSynthesis.speak(utterance);
        return true;
      } catch (e) {
        console.error('[TTS] 浏览器 TTS 失败:', e);
        return false;
      }
    }
    
    ipcRenderer.on('python-message', (event, message) => {
      console.log('[接收]', message.type, message);
      
      if (message.type === 'chat_response') {
        const data = message.data;
        if (data.status === 'success') {
          addMessage(data.response, false);
          playAIResponse(data.response);
        } else {
          addMessage('汪...出错了：' + data.message, false);
        }
      } else if (message.type === 'tts_response') {
        const ttsData = message.data;
        if (ttsData.status === 'success' && ttsData.audio_base64) {
          console.log('[TTS] 收到音频数据，大小:', ttsData.file_size);
          playBase64Audio(ttsData.audio_base64, ttsData.mime_type);
        } else if (ttsData.status === 'error' && ttsData.fallback) {
          console.log('[TTS] 使用浏览器原生 TTS 作为备选');
          browserTTS(ttsData.text);
        } else if (ttsData.status === 'error') {
          console.error('[TTS] 失败:', ttsData.message);
        }
      } else if (message.type === 'status_response' || message.type === 'status_update') {
        const data = message.data;
        if (data && data.status === 'success' && data.data) {
          const statusData = data.data;
          updateAgentStatus(
            statusData.status,
            statusData.provider,
            statusData.model,
            statusData.message_count,
            statusData.error_count,
            statusData.last_update
          );
        }
      }
    });
    
    ipcRenderer.on('connection-status', (event, status) => {
      console.log('[连接]', status);
      if (status === 'connected') {
        connectionDot.className = 'status-dot ready';
        connectionText.textContent = '已连接';
      } else if (status === 'disconnected') {
        connectionDot.className = 'status-dot disconnected';
        connectionText.textContent = '未连接';
      } else {
        connectionDot.className = 'status-dot';
        connectionText.textContent = '连接中...';
      }
    });
    
    sendBtn.addEventListener('click', sendMessage);
    voiceBtn.addEventListener('click', () => {
      if (recognition) {
        if (isListening) { recognition.stop(); } else { recognition.start(); }
      } else {
        alert('您的浏览器不支持语音识别功能');
      }
    });
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') { sendMessage(); }
    });
    clearBtn.addEventListener('click', clearHistory);
    agentStatusItem.addEventListener('click', () => {
      statusPanel.classList.toggle('show');
      console.log('[界面] 切换状态面板');
    });
    document.addEventListener('click', (e) => {
      if (!statusPanel.contains(e.target) && !agentStatusItem.contains(e.target)) {
        statusPanel.classList.remove('show');
      }
    });
    
    initSpeechRecognition();
    loadHistory();
    console.log('dogeAgent 聊天窗口已启动！');
  </script>
</body>
</html>
