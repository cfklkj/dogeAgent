<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dogeAgent - 聊天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .status {
      font-size: 12px;
      opacity: 0.8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1.5s infinite;
    }
    
    .status-dot.connected {
      background: #10b981;
    }
    
    .status-dot.disconnected {
      background: #ef4444;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .chat-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    
    .message {
      margin-bottom: 15px;
      max-width: 80%;
      animation: messageIn 0.3s ease-out;
    }
    
    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message.user {
      margin-left: auto;
      background: #48bb78;
      color: white;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
    }
    
    .message.ai {
      margin-right: auto;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
    }
    
    .message-time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    
    .message.ai .message-time {
      text-align: left;
    }
    
    .input-area {
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: flex;
      gap: 10px;
    }
    
    #userInput {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
    }
    
    #userInput:focus {
      background: white;
    }
    
    #sendBtn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: #48bb78;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    #sendBtn:hover {
      background: #38a169;
      transform: scale(1.05);
    }
    
    #sendBtn:active {
      transform: scale(0.95);
    }
    
    .typing {
      font-style: italic;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🐶 dogeAgent</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">连接中...</span>
    </div>
  </div>
  
  <div class="chat-container" id="chatContainer">
    <div class="message ai">
      <div>汪！我已经准备好了，可以开始聊天啦！</div>
      <div class="message-time" id="initialTime"></div>
    </div>
  </div>
  
  <div class="input-area">
    <input type="text" id="userInput" placeholder="输入消息..." />
    <button id="sendBtn">➤</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const initialTime = document.getElementById('initialTime');
    
    // 设置初始时间
    initialTime.textContent = formatTime(new Date());
    
    // 格式化时间
    function formatTime(date) {
      const hours = date.getHours().toString().padStart(2, '0');
      const minutes = date.getMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }
    
    // 添加消息到聊天
    function addMessage(text, isUser = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
      
      const contentDiv = document.createElement('div');
      contentDiv.textContent = text;
      
      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      timeDiv.textContent = formatTime(new Date());
      
      messageDiv.appendChild(contentDiv);
      messageDiv.appendChild(timeDiv);
      chatContainer.appendChild(messageDiv);
      
      // 滚动到底部
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    
    // 发送消息
    function sendMessage() {
      const message = userInput.value.trim();
      if (message) {
        // 添加用户消息
        addMessage(message, true);
        
        // 发送到 Python
        ipcRenderer.send('send-to-python', {
          type: 'chat',
          payload: {
            message: message,
            history: []
          }
        });
        
        userInput.value = '';
      }
    }
    
    // 监听 Python 响应
    ipcRenderer.on('python-message', (event, message) => {
      if (message.type === 'chat_response') {
        const data = message.data;
        if (data.status === 'success') {
          addMessage(data.response, false);
        } else {
          addMessage('汪...出错了：' + data.message, false);
        }
      }
    });
    
    // 连接状态
    ipcRenderer.on('connection-status', (event, status) => {
      if (status === 'connected') {
        statusDot.className = 'status-dot connected';
        statusText.textContent = '已连接';
      } else if (status === 'disconnected') {
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = '未连接';
      } else {
        statusDot.className = 'status-dot';
        statusText.textContent = '连接中...';
      }
    });
    
    // 发送按钮
    sendBtn.addEventListener('click', sendMessage);
    
    // 回车发送
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
    
    console.log('dogeAgent 聊天窗口已启动！');
  </script>
</body>
</html>
